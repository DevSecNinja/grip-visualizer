---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    uses: DevSecNinja/.github/.github/workflows/lint.yml@783a7a3a03ae71efcdf5b13eaea80efe26dfa641 # v2.2.0
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.7.5"
      # renovate: datasource=github-releases depName=golangci/golangci-lint
      golangci-lint-version: "v2.12.2"
      lint-go: false
      # No shell scripts in this repo; skip shell linters that otherwise fail
      # when invoked with zero files.
      lint-shellcheck: false
      lint-shfmt: false
